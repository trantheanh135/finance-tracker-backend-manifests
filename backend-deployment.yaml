apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-tracker-backend
  namespace: default
  labels:
    app: finance-tracker-backend
  annotations: {}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-tracker-backend
  template:
    metadata:
      labels:
        app: finance-tracker-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/trantheanh135/finance-tracker-backend:5ca58dd3df195043db7cc8dac7acaa69cf84fd84
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: DATABASE_URL
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: JWT_EXPIRATION
            - name: LLAMAPARSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: LLAMAPARSE_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: DEEPSEEK_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
