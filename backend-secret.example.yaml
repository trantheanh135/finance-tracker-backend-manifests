# Copy to backend-secret.yaml, fill in real values, then:
#   kubectl apply -f finance-tracker/backend/backend-secret.yaml
# Never commit backend-secret.yaml — it is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: backend-app-secret
  namespace: default
  labels:
    app: finance-tracker-backend
type: Opaque
stringData:
  DATABASE_URL: "jdbc:postgresql://postgresql:5432/finance_tracker?serverTimezone=UTC"
  DATABASE_USERNAME: "postgres"
  DATABASE_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME_use_a_long_random_string_here"
  JWT_EXPIRATION: "86400000"
  LLAMAPARSE_API_KEY: "CHANGE_ME"
  DEEPSEEK_API_KEY: "CHANGE_ME"
